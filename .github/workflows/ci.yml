name: ci
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        include:
          # x86 at the project's deployment floor (x86-64-v3: AVX2+FMA).
          # Baseline x86-64 (SSE2, no FMA) is NOT a target and rounds
          # fp-contracted expressions differently -> bitstream divergence.
          - { os: ubuntu-24.04,     cflags: "-march=x86-64-v3" }
          - { os: ubuntu-24.04-arm, cflags: "" }   # NEON baseline (Graviton-class)
          - { os: macos-15,         cflags: "" }   # Apple NEON
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev
      - name: deps (macos)
        if: runner.os == 'macOS'
        run: brew list zstd >/dev/null 2>&1 || brew install zstd
      - name: build
        run: CC=clang cmake -B build -S . -DMC_NO_NATIVE=ON -DCMAKE_C_FLAGS="${{ matrix.cflags }}" && cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure
      - name: deterministic archive metrics
        run: |
          clang -O3 ${{ matrix.cflags }} -w -Isrc -Itools/vendor/libs3 -I/opt/homebrew/include \
            tests/mc_det_archive.c src/matter_compressor.c src/c3d.c tools/vendor/libs3/libs3.c \
            -L/opt/homebrew/lib -lm -lpthread -lzstd -lcurl -o detarc
          mkdir -p digest && ./detarc | tee digest/${{ matrix.os }}.txt
      - uses: actions/upload-artifact@v4
        with: { name: "digest-${{ matrix.os }}", path: digest/ }
  asan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev
      - name: build+fuzz under ASan/UBSan
        run: |
          SRCS="src/matter_compressor.c src/c3d.c tools/vendor/libs3/libs3.c"
          FLAGS="-O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all -w -Isrc -Itools/vendor/libs3"
          LIBS="-lm -lpthread -lzstd -lcurl"
          clang $FLAGS tests/mc_v6_test.c $SRCS $LIBS -o v6_asan
          ./v6_asan
          clang $FLAGS tests/mc_cache_test.c $SRCS $LIBS -o cache_asan
          ./cache_asan
          clang $FLAGS tests/mc_render_test.c $SRCS $LIBS -o render_asan
          ./render_asan
  metric-equivalence:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: "digest-*", merge-multiple: true, path: digests }
      - name: assert metric-equivalent archives across ISAs/compilers
        run: |
          cat digests/*.txt
          # size to the KB, PSNR to 0.1 dB, MAE to 0.01, max error exact —
          # last-bit float rounding may differ; delivered quality must not.
          [ "$(sort -u digests/*.txt | wc -l)" -eq 1 ] && echo EQUIVALENT || { echo DIVERGENT; exit 1; }
