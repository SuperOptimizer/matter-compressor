name: ci
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        include:
          # x86 at the project's deployment floor (x86-64-v3: AVX2+FMA).
          - { os: ubuntu-24.04,     cflags: "-march=x86-64-v3" }
          - { os: ubuntu-24.04-arm, cflags: "" }   # NEON baseline (Graviton-class)
          - { os: macos-15,         cflags: "" }   # Apple NEON
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev
      - name: deps (macos)
        if: runner.os == 'macOS'
        run: brew list zstd >/dev/null 2>&1 || brew install zstd
      - name: build
        run: CC=clang cmake -B build -S . -DMC_NO_NATIVE=ON -DCMAKE_C_FLAGS="${{ matrix.cflags }}" && cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure
  asan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev
      - name: build+run tests under ASan/UBSan
        run: |
          SRCS="src/matter_compressor.c src/c3d.c tools/vendor/libs3/libs3.c"
          FLAGS="-O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all -w -Isrc -Itools/vendor/libs3"
          LIBS="-lm -lpthread -lzstd -lcurl"
          for t in mc_v6_test mc_cache_test mc_render_test mc_api_test mc_decode_robust_test; do
            echo "== $t (ASan/UBSan) =="
            clang $FLAGS tests/$t.c $SRCS $LIBS -o ${t}_asan
            ./${t}_asan
          done
      - name: fuzz smoke (AFL++ harness, replay committed crash corpus)
        run: |
          # Build the libFuzzer-API harness in standalone replay mode under ASan
          # and replay the committed regression corpus — fast, deterministic, no
          # AFL++ install needed. (Full AFL++ campaigns run via scripts/fuzz.sh.)
          SRCS="src/matter_compressor.c src/c3d.c tools/vendor/libs3/libs3.c"
          FLAGS="-O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all -w -DMC_FUZZ_STANDALONE -Isrc -Itools/vendor/libs3"
          clang $FLAGS tests/fuzz/mc_fuzz_decode.c $SRCS -lm -lpthread -lzstd -lcurl -o fuzz_replay
          ./fuzz_replay tests/fuzz/crashes/*.mca
  tsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev
      - name: concurrency under ThreadSanitizer
        run: |
          # Two threaded surfaces under TSan:
          #  - cache: 64-shard concurrent get/evict + freeze/thaw tick-phase.
          #  - archive append index: the lock-free node-tree CAS-publish path
          #    (w_ensure_shard_slot / w_publish_child) — the index-corruption race
          #    class. It mmaps a 10 TiB MAP_NORESERVE region by default, which
          #    collides with TSan's shadow (mmap ENOMEM), so shrink the reservation
          #    via -DMC_RESERVE for the TSan build (MC_RESERVE is #ifndef-guarded).
          SRCS="src/matter_compressor.c src/c3d.c tools/vendor/libs3/libs3.c"
          FLAGS="-O1 -g -fsanitize=thread -fno-sanitize-recover=all -w -Isrc -Itools/vendor/libs3"
          LIBS="-lm -lpthread -lzstd -lcurl"
          clang $FLAGS tests/mc_cache_test.c $SRCS $LIBS -o cache_tsan
          ./cache_tsan
          clang $FLAGS -DMC_RESERVE='(2ull*1024*1024*1024)' \
            tests/mc_archive_concurrent_test.c $SRCS $LIBS -o archive_tsan
          TSAN_OPTIONS=halt_on_error=1 ./archive_tsan
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev llvm
      - name: line/region coverage of matter_compressor.c (log-only)
        run: CC=clang bash scripts/coverage.sh build_cov
      - name: publish coverage to job summary
        if: always()
        run: cat build_cov/summary.md >> "$GITHUB_STEP_SUMMARY" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            build_cov/coverage.txt
            build_cov/coverage.lcov
            build_cov/html
  bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev
      - name: benchmarks (log-only, synthetic — no regression gate)
        run: CC=clang bash scripts/bench.sh build_bench
      - name: publish benchmarks to job summary
        if: always()
        run: cat build_bench/summary.md >> "$GITHUB_STEP_SUMMARY" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmarks
          path: |
            build_bench/micro.json
            build_bench/quality.txt
