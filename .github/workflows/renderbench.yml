name: renderbench
on:
  push:
    branches: [renderbench]
jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cat /proc/cpuinfo | grep "model name" | head -1
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libzstd-dev
      - name: build both variants
        run: |
          clang -I src -O3 -march=x86-64-v3 -o rb_tri8 bench/render_bench.c src/matter_compressor.c src/c3d.c tools/vendor/libs3/libs3.c -Itools/vendor/libs3 -lm -lpthread -lzstd -lcurl
          clang -I src -O3 -march=x86-64-v3 -DMC_S_NO_TRI8 -o rb_tri4 bench/render_bench.c src/matter_compressor.c src/c3d.c tools/vendor/libs3/libs3.c -Itools/vendor/libs3 -lm -lpthread -lzstd -lcurl
      - name: interleaved A/B x3
        run: |
          for i in 1 2 3; do
            echo "=== round $i tri8 ==="; ./rb_tri8 | grep 1T
            echo "=== round $i tri4 ==="; ./rb_tri4 | grep 1T
          done
